name: Konyak Verify

on:
  pull_request:
  push:
  workflow_dispatch:

jobs:
  verify:
    name: Konyak
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: cachix/install-nix-action@v31
      - name: Run repository checks
        run: nix develop -c zsh -lc 'just verify'
