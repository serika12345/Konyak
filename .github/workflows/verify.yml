name: Konyak Verify

on:
  pull_request:
  push:
  workflow_dispatch:

jobs:
  verify:
    name: Konyak
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: cachix/install-nix-action@v31
      - name: Run repository checks
        run: nix develop -c zsh -lc 'just verify'
      - name: Upload Flutter test failures
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-test-failures-${{ github.event_name }}-${{ github.run_id }}
          path: apps/konyak/test/failures/
          if-no-files-found: ignore
