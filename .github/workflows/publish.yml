name: Konyak Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  linux:
    name: Linux AppImage
    runs-on: ubuntu-24.04
    env:
      KONYAK_RUNTIME_STACK_SOURCE_MANIFEST: ${{ vars.KONYAK_RUNTIME_STACK_SOURCE_MANIFEST }}
      KONYAK_RUNTIME_STACK_PUBLIC_KEY: ${{ vars.KONYAK_RUNTIME_STACK_PUBLIC_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31

      - name: Build Linux release artifact
        run: nix run .#linux-release

      - name: Smoke Linux release metadata
        run: nix develop -c zsh -lc './scripts/smoke_linux_release_metadata.zsh'

      - name: Smoke Linux AppImage AppRun runtime environment
        run: nix develop -c zsh -lc './scripts/smoke_linux_appimage_apprun_env.zsh'

      - name: Smoke Linux AppImage update handoff
        run: nix develop -c zsh -lc './scripts/smoke_linux_appimage_update_handoff.zsh'

      - name: Smoke Linux desktop integration
        run: nix develop -c zsh -lc './scripts/smoke_linux_desktop_integration.zsh'

      - name: Smoke Linux pinned launcher integration
        run: nix develop -c zsh -lc './scripts/smoke_linux_pinned_launcher_integration.zsh'

      - uses: actions/upload-artifact@v4
        with:
          name: konyak-linux-release
          path: |
            .dart_tool/konyak/release/linux/Konyak-*.AppImage
            .dart_tool/konyak/release/linux/Konyak-*.AppImage.sha256
            .dart_tool/konyak/release/linux/Konyak-*.release.json
            .dart_tool/konyak/release/linux/SHA256SUMS
            .dart_tool/konyak/release/linux/release-notes.md
            .dart_tool/konyak/release/linux/konyak-linux-wine-runtime-stack-source.json
            .dart_tool/konyak/release/linux/konyak-linux-wine-runtime-stack-source.json.sig
            .dart_tool/konyak/release/linux/konyak-runtime-stack-public-key.pem
          if-no-files-found: ignore

  macos:
    name: macOS app
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31

      - name: Build unnotarized macOS release artifact
        run: nix run .#macos-release

      - name: Smoke packaged macOS runtime extraction
        run: nix develop -c zsh -lc './scripts/smoke_macos_release_runtime_extraction.zsh'

      - name: Smoke packaged macOS DMG layout
        run: nix develop -c zsh -lc './scripts/smoke_macos_dmg_layout.zsh'

      - name: Smoke packaged macOS Finder integration
        run: nix develop -c zsh -lc 'fixture="$(./scripts/fetch_windows_fixture_putty.zsh)" && ./scripts/smoke_macos_finder_integration.zsh .dart_tool/konyak/release/macos/Konyak.app "$fixture"'

      - name: Smoke packaged macOS app CLI bridge
        run: nix develop -c zsh -lc './scripts/smoke_macos_packaged_app_cli_bridge.zsh .dart_tool/konyak/release/macos/Konyak.app'

      - name: Smoke packaged macOS app update handoff
        run: nix develop -c zsh -lc './scripts/smoke_macos_app_update_handoff.zsh .dart_tool/konyak/release/macos/Konyak.app'

      - uses: actions/upload-artifact@v4
        with:
          name: konyak-macos-release
          path: |
            .dart_tool/konyak/release/macos/Konyak-*.dmg
            .dart_tool/konyak/release/macos/Konyak-*.dmg.sha256
            .dart_tool/konyak/release/macos/Konyak-*.release.json
            .dart_tool/konyak/release/macos/SHA256SUMS
            .dart_tool/konyak/release/macos/release-notes.md

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-24.04
    needs:
      - linux
      - macos
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: konyak-linux-release
          path: .dart_tool/konyak/release-publish/linux

      - uses: actions/download-artifact@v4
        with:
          name: konyak-macos-release
          path: .dart_tool/konyak/release-publish/macos

      - name: Publish GitHub release assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          tag="${GITHUB_REF_NAME}"
          publish_dir=".dart_tool/konyak/release-publish"
          linux_dir="$publish_dir/linux"
          macos_dir="$publish_dir/macos"
          combined_checksums="$publish_dir/SHA256SUMS"
          notes_path="$publish_dir/release-notes.md"

          linux_appimages=("$linux_dir"/Konyak-*.AppImage)
          linux_appimage_checksums=("$linux_dir"/Konyak-*.AppImage.sha256)
          linux_metadata=("$linux_dir"/Konyak-*.release.json)
          linux_checksums=("$linux_dir"/SHA256SUMS)
          macos_dmgs=("$macos_dir"/Konyak-*.dmg)
          macos_dmg_checksums=("$macos_dir"/Konyak-*.dmg.sha256)
          macos_metadata=("$macos_dir"/Konyak-*.release.json)
          macos_checksums=("$macos_dir"/SHA256SUMS)

          if [[ ${#linux_appimages[@]} -ne 1 ||
                ${#linux_appimage_checksums[@]} -ne 1 ||
                ${#linux_metadata[@]} -ne 1 ||
                ${#linux_checksums[@]} -ne 1 ||
                ${#macos_dmgs[@]} -ne 1 ||
                ${#macos_dmg_checksums[@]} -ne 1 ||
                ${#macos_metadata[@]} -ne 1 ||
                ${#macos_checksums[@]} -ne 1 ]]; then
            echo "Expected exactly one release artifact, checksum, metadata file, and SHA256SUMS per platform." >&2
            find "$publish_dir" -maxdepth 2 -type f -print | sort >&2
            exit 1
          fi

          cat "${macos_checksums[0]}" "${linux_checksums[0]}" >"$combined_checksums"
          {
            printf "# Konyak %s\n\n" "${tag#v}"
            printf "## SHA-256\n\n"
            printf '```text\n'
            cat "$combined_checksums"
            printf '```\n'
          } >"$notes_path"

          assets=(
            "${macos_dmgs[0]}"
            "${macos_dmg_checksums[0]}"
            "${macos_metadata[0]}"
            "${linux_appimages[0]}"
            "${linux_appimage_checksums[0]}"
            "${linux_metadata[0]}"
            "$combined_checksums"
          )

          optional_assets=(
            "$linux_dir"/konyak-linux-wine-runtime-stack-source.json
            "$linux_dir"/konyak-linux-wine-runtime-stack-source.json.sig
            "$linux_dir"/konyak-runtime-stack-public-key.pem
          )
          for optional_asset in "${optional_assets[@]}"; do
            if [[ -f "$optional_asset" ]]; then
              assets+=("$optional_asset")
            fi
          done

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "${assets[@]}" --clobber
            gh release edit "$tag" --title "$tag" --notes-file "$notes_path" --draft=false --latest --verify-tag
          else
            gh release create "$tag" "${assets[@]}" --title "$tag" --notes-file "$notes_path" --verify-tag --latest
          fi
