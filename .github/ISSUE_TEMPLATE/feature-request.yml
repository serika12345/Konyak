name: Konyak Feature Request
description: Propose a Konyak feature or compatibility improvement.
type: Enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Describe the user problem or compatibility gap.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the behavior you want Konyak to support.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Flutter UI
        - CLI contract
        - Runtime management
        - Bottle metadata
        - Linux support
        - macOS support
        - Packaging
        - Other
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add screenshots, logs, links, or context notes if useful.
    validations:
      required: false
