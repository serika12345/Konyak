name: Konyak Bug Report
description: Report a reproducible Konyak defect.
type: Bug
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe what failed and what you were trying to do.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: List the smallest steps that reproduce the problem.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: Describe the behavior you expected.
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Linux x86_64
        - macOS Apple Silicon
        - macOS Intel
        - Other
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or command output
      description: Paste relevant Konyak, Flutter, CLI, Wine, or terminal logs.
      render: text
    validations:
      required: false
