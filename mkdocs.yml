site_name: Konyak Documentation
site_description: Compatibility profile authoring and schema reference for Konyak
site_url: https://serika12345.github.io/Konyak/docs/
repo_name: serika12345/Konyak
repo_url: https://github.com/serika12345/Konyak
edit_uri: edit/main/docs/public/

docs_dir: docs/public
site_dir: build/pages/docs
strict: true
use_directory_urls: true

nav:
  - Home: index.md
  - Compatibility profiles:
      - Authoring guide: profiles/index.md
      - Validation layers: profiles/validation.md
      - Versioning policy: profiles/versioning.md
      - Schema v1 reference: profiles/schema-v1.md
      - Raw schema v1: https://serika12345.github.io/Konyak/schemas/profile-v1.schema.json

theme:
  name: material
  language: en
  features:
    - navigation.indexes
    - navigation.sections
    - search.highlight
    - search.suggest
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep orange
      accent: orange
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep orange
      accent: orange
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search

markdown_extensions:
  - attr_list
  - tables
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css

copyright: Copyright &copy; Konyak contributors
